<style>
:root{
  --bg:#0B0E1A; --bg2:#141931; --card:#1B2140;
  --gold:#FFC93C; --magenta:#FF3D7F; --teal:#2FE6C4; --violet:#7B61FF;
  --ink:#F5F5FA; --muted:#8B93A8; --line:rgba(255,255,255,0.08);
}
/* Variables below are consumed by nav.js (shared hamburger/settings sidebar) —
   not used by the quiz UI itself. Values match the app's default theme in
   scenario.html so the sidebar/modal look consistent across the whole suite. */
:root{
  --navy:#1C3A6E; --navy-dark:#122849; --navy-light:#2A4F8F;
  --red:#C0392B; --red-light:#FDEDEC;
  --amber:#E8921A; --amber-light:#FEF5E7; --btn-accent:#E8921A; --green:#27833A; --green-light:#EAFAF1;
  --blue:#2E86C1; --blue-light:#EBF5FB;
  --purple:#7D3C98; --purple-light:#F5EEF8;
  --grey:#6C7A89; --light:#F4F6F9; --white:#FFFFFF; --text:#1A1A2E; --border:#D5D8DC;
  --shadow:0 2px 8px rgba(28,58,110,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Poppins',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; flex-direction:column;
  background-image:
    radial-gradient(circle at 50% -10%, rgba(255,201,60,0.15), transparent 60%),
    radial-gradient(circle at 90% 20%, rgba(255,61,127,0.12), transparent 50%),
    radial-gradient(circle at 10% 80%, rgba(47,230,196,0.10), transparent 50%);
}
.stage-bar{background:linear-gradient(90deg,var(--bg2),var(--card)); border-bottom:2px solid var(--gold); color:var(--gold); padding:16px 20px; font-weight:900; font-size:18px; display:flex; align-items:center; gap:12px;}
.wrap{max-width:480px;margin:0 auto;padding:20px;width:100%;flex:1;}
.card{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:24px; box-shadow:0 12px 30px rgba(0,0,0,0.35);}
label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
input{width:100%;padding:14px;border:1px solid var(--line);border-radius:10px;font-size:20px;text-align:center;letter-spacing:6px;text-transform:uppercase;margin-bottom:14px; background:#0F1428; color:var(--gold); font-family:'Space Mono',monospace;}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:12px;font-weight:800;font-size:16px;cursor:pointer;background:var(--gold);color:#1B1400; text-transform:uppercase; letter-spacing:0.5px; transition:transform .12s;}
.btn:active{transform:scale(0.97);}
.btn:disabled{opacity:0.4;}
.err{color:var(--magenta);font-size:13px;margin-top:-8px;margin-bottom:12px;font-weight:600;}
.hidden{display:none;}
.center{text-align:center;padding:40px 0;color:var(--muted);}
.pulse-dots span{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--gold);margin:0 4px;animation:dotPulse 1.2s infinite ease-in-out;}
.pulse-dots span:nth-child(2){animation-delay:0.2s;}
.pulse-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dotPulse{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
.timer-bar-track{width:100%;height:10px;border-radius:6px;background:#0F1428;overflow:hidden;margin-bottom:18px;}
.timer-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));width:100%;transition:width 0.2s linear, background 0.3s;}
.q-text{font-size:20px;font-weight:800;margin-bottom:18px;text-align:center;}
.opt-btn{display:flex;align-items:center;gap:12px;width:100%;padding:18px;margin-bottom:10px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;text-align:left;color:var(--qtext,#fff); background:linear-gradient(135deg,var(--qc1,#3FBFAE),var(--qc2,#2C9686));}
.opt-btn .shape{font-size:18px;}
.opt-btn.selected{outline:3px solid white; transform:scale(0.98);}
.opt-btn:disabled{cursor:default; opacity:0.55;}
#q-image-wrap{text-align:center;margin-bottom:16px;}
#q-image-wrap img{max-width:100%;max-height:220px;border-radius:12px;border:1px solid var(--line);}
#q-options.pic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.opt-btn.pic-opt{flex-direction:column;align-items:stretch;padding:8px;gap:6px;}
.opt-btn.pic-opt img{width:100%;height:120px;object-fit:contain;background:rgba(0,0,0,0.15);border-radius:8px;display:block;}
.opt-btn.pic-opt .pic-fallback{display:flex;align-items:center;justify-content:center;height:120px;border-radius:8px;background:rgba(0,0,0,0.15);font-size:13px;text-align:center;padding:6px;}
.open-quiz-item{display:flex;justify-content:space-between;align-items:center;width:100%;padding:14px;margin-bottom:8px;border-radius:10px;border:1px solid var(--line);background:#0F1428;font-size:15px;font-weight:700;cursor:pointer;text-align:left;color:var(--ink);}
.open-quiz-item .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(47,230,196,0.15);color:var(--teal);}
.open-quiz-item .tag.live{background:rgba(255,201,60,0.15);color:var(--gold);}
.feedback{text-align:center;font-size:26px;font-weight:900;margin-bottom:14px;animation:popIn .35s ease;}
@keyframes popIn{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}
.feedback.good{color:var(--teal); text-shadow:0 0 20px rgba(47,230,196,0.5);}
.feedback.bad{color:var(--magenta); text-shadow:0 0 20px rgba(255,61,127,0.5);}
.score-line{text-align:center;color:var(--muted);font-size:14px;margin-top:16px;}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin:20px 0 24px;}
.pod-step{flex:1;max-width:100px;border-radius:12px 12px 0 0;text-align:center;padding:12px 4px 8px;animation:slideUp .5s ease backwards;}
.pod-step .pname{font-weight:800;font-size:12px;margin-bottom:4px;}
.pod-step .pscore{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;}
.pod-1{background:linear-gradient(180deg,var(--gold),#B8890A);height:140px;order:2;color:#1B1400;}
.pod-2{background:linear-gradient(180deg,#C7CEDB,#8A93A6);height:100px;order:1;color:#12162A;}
.pod-3{background:linear-gradient(180deg,#D98A4B,#9C5A26);height:78px;order:3;color:#1B1400;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.lb-row{display:flex;justify-content:space-between;padding:10px 4px;border-bottom:1px solid var(--line);font-size:15px;}
.lb-rank{font-weight:800;color:var(--gold);margin-right:10px;font-family:'Space Mono',monospace;}
</style>

let _soundEnabled = false;
function relLuma(hex) {
  const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  return 0.299*r + 0.587*g + 0.114*b;
}

// Mirrors quiz_host.html's questionPalette — builds the 4-colour answer palette
// from the current theme's CSS variables instead of a fixed static palette.
function questionPalette() {
  const cs = getComputedStyle(document.documentElement);
  const fallback = { '--magenta':'#FF3D7F', '--teal':'#2FE6C4', '--gold':'#FFC93C', '--violet':'#7B61FF' };
  return ['--magenta','--teal','--gold','--violet'].map(v => {
    const hex = (cs.getPropertyValue(v).trim() || fallback[v]);
    const hsl = hexToHsl(hex);
    const darker = hslToHex(hsl.h, hsl.s, Math.max(15, hsl.l - 18));
    const text = relLuma(hex) > 0.6 ? '#2A1B00' : '#fff';
    return [hex, darker, text];
  });
}

function toggleSound() {
  _soundEnabled = !_soundEnabled;
  document.getElementById('sound-toggle').textContent = _soundEnabled ? '🔊' : '🔇';
  if (_soundEnabled) playTone(880, 0.12);
}

let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}
function playTone(freq, duration, type='sine', volume=0.2) {
  if (!_soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function playTick(urgent) { playTone(urgent ? 1200 : 800, 0.08, 'square', 0.12); }
function playChime(correct) {
  if (correct) { playTone(880, 0.15); setTimeout(()=>playTone(1320, 0.2), 100); }
  else { playTone(220, 0.25, 'sawtooth', 0.15); }
}
function playFanfare() {
  const notes = [523.25, 659.25, 783.99, 1046.5];
  notes.forEach((f,i) => setTimeout(()=>playTone(f, 0.3, 'triangle', 0.18), i*120));
}

function fireConfetti(intensity) {
  const count = intensity === 'big' ? 140 : intensity === 'medium' ? 70 : 30;
  let canvas = document.getElementById('confetti-canvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'confetti-canvas';
    canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
    document.body.appendChild(canvas);
  }
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#FFC93C','#FF3D7F','#2FE6C4','#7B61FF'];
  const particles = Array.from({length:count}, () => ({
    x: Math.random()*canvas.width,
    y: -20 - Math.random()*canvas.height*0.3,
    r: 4 + Math.random()*5,
    color: colors[Math.floor(Math.random()*colors.length)],
    vy: 2 + Math.random()*3,
    vx: (Math.random()-0.5)*2,
    rot: Math.random()*360,
    vrot: (Math.random()-0.5)*10
  }));
  const start = Date.now();
  const duration = 3500;
  function frame() {
    const elapsed = Date.now() - start;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6);
      ctx.restore();
    });
    if (elapsed < duration) requestAnimationFrame(frame);
    else { ctx.clearRect(0,0,canvas.width,canvas.height); canvas.remove(); }
  }
  requestAnimationFrame(frame);
}

async function requireAuth() {
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) { window.location.href = 'login.html?redirect=quiz_player.html'; return null; }
  return session;
}

async function init() {
  _session = await requireAuth();
  if (!_session) return;
  const { data: profile } = await _sb.from('profiles').select('display_name,avatar_url').eq('id', _session.user.id).single();
  _profile = profile;
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) document.getElementById('join-code').value = code.toUpperCase();
  loadOpenQuizzes();
  _sb.channel('open-rooms-list')
    .on('postgres_changes', { event:'*', schema:'public', table:'quiz_rooms' }, loadOpenQuizzes)
    .subscribe();
}
init();

async function loadOpenQuizzes() {
  const list = document.getElementById('open-quizzes-list');
  try {
    const rows = await sbFetch(`quiz_rooms?status=in.(lobby,live)&select=code,status,created_at&order=created_at.desc&limit=10`);
    if (!rows.length) { list.innerHTML = '<div class="center" style="padding:8px 0">No open quizzes right now.</div>'; return; }
    list.innerHTML = rows.map(r => `<button type="button" class="open-quiz-item" onclick="quickJoin('${r.code}')"><span>Room ${r.code}</span><span class="tag${r.status==='live'?' live':''}">${r.status==='live'?'In progress':'Lobby'}</span></button>`).join('');
  } catch(e) { list.innerHTML = ''; }
}

function quickJoin(code) {
  document.getElementById('join-code').value = code;
  joinRoom();
}

function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function isValidHex(h) { return typeof h === 'string' && /^#[0-9A-Fa-f]{6}$/.test(h); }

function hexToHsl(hex) {
  const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h=0, s=0, l=(max+min)/2;
  if (max !== min) {
    const d = max-min;
    s = l>0.5 ? d/(2-max-min) : d/(max+min);
    if (max===r) h = (g-b)/d + (g<b?6:0);
    else if (max===g) h = (b-r)/d + 2;
    else h = (r-g)/d + 4;
    h *= 60;
  }
  return { h, s: s*100, l: l*100 };
}

function hslToHex(h, s, l) {
  h = ((h%360)+360)%360; s = Math.max(0,Math.min(100,s))/100; l = Math.max(0,Math.min(100,l))/100;
  const c = (1-Math.abs(2*l-1))*s, x = c*(1-Math.abs((h/60)%2-1)), m = l-c/2;
  let r,g,b;
  if (h<60) [r,g,b]=[c,x,0]; else if (h<120) [r,g,b]=[x,c,0]; else if (h<180) [r,g,b]=[0,c,x];
  else if (h<240) [r,g,b]=[0,x,c]; else if (h<300) [r,g,b]=[x,0,c]; else [r,g,b]=[c,0,x];
  const toHex = v => Math.round((v+m)*255).toString(16).padStart(2,'0');
  return '#'+toHex(r)+toHex(g)+toHex(b);
}

// Mirrors quiz_host.html's applyQuizTheme — applies the AI-suggested 4-colour palette
// directly (no hue-rotation math) so players see the same genuinely-distinct theme colours
// as the host, derived from the room row instead of a separate AI call.
function applyQuizTheme(primary, secondary, tertiary, quaternary) {
  if (!isValidHex(primary) || !isValidHex(secondary) || !isValidHex(tertiary) || !isValidHex(quaternary)) return;
  try {
    const p = hexToHsl(primary);
    const root = document.documentElement.style;
    root.setProperty('--gold', primary);
    root.setProperty('--magenta', secondary);
    root.setProperty('--teal', tertiary);
    root.setProperty('--violet', quaternary);
    root.setProperty('--bg', hslToHex(p.h, 35, 8));
    root.setProperty('--bg2', hslToHex(p.h, 30, 12));
    root.setProperty('--card', hslToHex(p.h, 26, 17));
  } catch(e) { /* keep default palette on any failure */ }
}

async function sbFetch(path, opts={}) {
  const token = (_session && _session.access_token) || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type':'application/json',
      'Prefer': opts.prefer || 'return=representation', ...(opts.headers||{}) }
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || `Supabase error ${res.status}`); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function joinRoom() {
  const errEl = document.getElementById('join-err');
  errEl.classList.add('hidden');
  const code = (document.getElementById('join-code').value||'').trim().toUpperCase();
  if (code.length!==4) { errEl.textContent='Enter the 4-character room code.'; errEl.classList.remove('hidden'); return; }
  const btn = document.getElementById('join-btn');
  btn.disabled=true; btn.textContent='Joining…';
  try {
    const rooms = await sbFetch(`quiz_rooms?code=eq.${code}&status=in.(lobby,live)&select=*`);
    if (!rooms.length) throw new Error('Room not found or already ended.');
    _room = rooms[0];
    applyQuizTheme(_room.theme_primary, _room.theme_secondary, _room.theme_tertiary, _room.theme_quaternary);
    const name = (_profile && _profile.display_name) || _session.user.email;
    const avatarUrl = (_profile && _profile.avatar_url) || null;
    const rows = await sbFetch(`quiz_players?on_conflict=room_id,user_id`, { method:'POST',
      headers:{ 'Prefer':'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify({ room_id:_room.id, user_id:_session.user.id, name, avatar_url:avatarUrl }) });
    _player = rows[0];
    document.getElementById('screen-join').classList.add('hidden');
    subscribeRoom();
    if (_room.status === 'live') { _lastSeenIndex = -1; checkForQuestion(); }
    else document.getElementById('screen-waiting').classList.remove('hidden');
  } catch(e) {
    errEl.textContent = e.message; errEl.classList.remove('hidden');
  } finally {
    btn.disabled=false; btn.textContent='Join Game';
  }
}

function subscribeRoom() {
  _roomChannel = _sb.channel('room-'+_room.id)
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'quiz_rooms', filter:`id=eq.${_room.id}` }, payload => {
      _room = payload.new;
      checkForQuestion();
    })
    .subscribe();
}

function hideAllGameScreens() {
  clearInterval(_timerInterval);
  ['screen-waiting','screen-question','screen-feedback','screen-end'].forEach(id=>document.getElementById(id).classList.add('hidden'));
}

async function checkForQuestion() {
  if (_room.status === 'ended') {
    hideAllGameScreens();
    document.getElementById('screen-end').classList.remove('hidden');
    if (_roomChannel) _sb.removeChannel(_roomChannel);
    const rows = await sbFetch(`quiz_players?room_id=eq.${_room.id}&select=id,name,score&order=score.desc`);
    const top3 = rows.slice(0,3);
    document.getElementById('podium').innerHTML = top3.map((p,i)=>`<div class="pod-step pod-${i+1}"><div class="pname">${escapeHtml(p.name)}</div><div class="pscore">${p.score}</div></div>`).join('');
    const myRank = rows.findIndex(p => p.id === _player.id) + 1;
    const mine = rows.find(p => p.id === _player.id);
    const yourScoreEl = document.getElementById('your-score');
    if (mine) {
      yourScoreEl.textContent = myRank <= 3 ? `You placed #${myRank} with ${mine.score} pts! 🎉` : `You placed #${myRank} with ${mine.score} pts.`;
    }
    playFanfare();
    fireConfetti(myRank === 1 ? 'big' : myRank <= 3 ? 'medium' : 'small');
    return;
  }
  if (_room.status !== 'live' || _room.current_question_index === _lastSeenIndex) return;
  _lastSeenIndex = _room.current_question_index;
  const qrows = await sbFetch(`quiz_questions?room_id=eq.${_room.id}&order_index=eq.${_room.current_question_index}&select=*`);
  const q = qrows[0];
  hideAllGameScreens();
  document.getElementById('screen-question').classList.remove('hidden');
  document.getElementById('q-text').textContent = q.question_text;
  const imgWrap = document.getElementById('q-image-wrap');
  const imgEl = document.getElementById('q-image');
  if (q.question_type === 'picture_question' && q.image_url) {
    imgEl.src = q.image_url;
    imgWrap.classList.remove('hidden');
  } else {
    imgWrap.classList.add('hidden');
    imgEl.src = '';
  }
  const shapes = ['▲','◆','●','■'];
  const pal = questionPalette()[_room.current_question_index % 4];
  const optsEl = document.getElementById('q-options');
  optsEl.style.setProperty('--qc1', pal[0]);
  optsEl.style.setProperty('--qc2', pal[1]);
  optsEl.style.setProperty('--qtext', pal[2]);
  const isPicAnswer = q.question_type === 'picture_answer';
  optsEl.classList.toggle('pic-grid', isPicAnswer);
  if (isPicAnswer) {
    optsEl.innerHTML = q.options.map((o,i)=>{
      const url = q.option_image_urls && q.option_image_urls[i];
      const body = url ? `<img src="${url}" alt="${escapeHtml(o)}">` : `<span class="pic-fallback">${escapeHtml(o)}</span>`;
      return `<button class="opt-btn pic-opt" onclick="submitAnswer('${q.id}',${i},${q.correct_index})"><span class="shape">${shapes[i]}</span>${body}</button>`;
    }).join('');
  } else {
    optsEl.innerHTML = q.options.map((o,i)=>`<button class="opt-btn" onclick="submitAnswer('${q.id}',${i},${q.correct_index})"><span class="shape">${shapes[i]}</span>${escapeHtml(o)}</button>`).join('');
  }
  startTimerBar(_room.question_started_at, _room.question_duration_seconds || 20);
}

function startTimerBar(startedAtISO, durationSec) {
  clearInterval(_timerInterval);
  const fill = document.getElementById('timer-bar-fill');
  if (!fill || !startedAtISO) return;
  const magentaHex = getComputedStyle(document.documentElement).getPropertyValue('--magenta').trim() || '#FF3D7F';
  const magentaHsl = hexToHsl(magentaHex);
  const magentaLight = hslToHex(magentaHsl.h, magentaHsl.s, Math.min(80, magentaHsl.l + 18));
  let _lastWholeSecond = null;
  function tick() {
    const elapsed = (Date.now() - new Date(startedAtISO).getTime()) / 1000;
    const remaining = Math.max(0, durationSec - elapsed);
    const pct = Math.max(0, Math.min(100, (remaining/durationSec)*100));
    fill.style.width = pct + '%';
    fill.style.background = remaining <= 5
      ? `linear-gradient(90deg, var(--magenta), ${magentaLight})`
      : 'linear-gradient(90deg, var(--teal), var(--gold))';
    const wholeRemaining = Math.ceil(remaining);
    if (wholeRemaining !== _lastWholeSecond && wholeRemaining > 0) {
      _lastWholeSecond = wholeRemaining;
      if (wholeRemaining <= 5) playTick(true);
    }
    if (remaining <= 0) {
      clearInterval(_timerInterval);
      document.querySelectorAll('.opt-btn').forEach(el => el.disabled = true);
    }
  }
  tick();
  _timerInterval = setInterval(tick, 200);
}

async function submitAnswer(questionId, selectedIndex, correctIndex) {
  clearInterval(_timerInterval);
  document.querySelectorAll('.opt-btn').forEach((el,i)=>{ el.disabled=true; if(i===selectedIndex) el.classList.add('selected'); });
  const isCorrect = selectedIndex === correctIndex;
  playChime(isCorrect);
  try {
    await sbFetch('quiz_answers', { method:'POST', prefer:'return=minimal',
      body: JSON.stringify({ room_id:_room.id, question_id:questionId, player_id:_player.id, selected_index:selectedIndex, is_correct:isCorrect }) });
  } catch(e) { /* likely already answered — ignore */ }

  hideAllGameScreens();
  document.getElementById('screen-feedback').classList.remove('hidden');
  const fb = document.getElementById('feedback-msg');
  fb.textContent = isCorrect ? '✅ Correct!' : '❌ Not quite';
  fb.className = 'feedback ' + (isCorrect?'good':'bad');
  document.getElementById('score-line').textContent = '';
}
</script>
