<style>
:root{
  --bg:#0B0E1A; --bg2:#141931; --card:#1B2140;
  --gold:#FFC93C; --magenta:#FF3D7F; --teal:#2FE6C4; --violet:#7B61FF;
  --ink:#F5F5FA; --muted:#8B93A8; --line:rgba(255,255,255,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Poppins',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh;
  background-image:
    radial-gradient(circle at 50% -10%, rgba(255,201,60,0.15), transparent 60%),
    radial-gradient(circle at 90% 20%, rgba(255,61,127,0.12), transparent 50%),

}
.stage-bar{background:linear-gradient(90deg,var(--bg2),var(--card));border-bottom:2px solid var(--gold); color:var(--gold); padding:16px 22px; font-weight:900; font-size:19px; display:flex; align-items:center; gap:14px; justify-content:space-between; letter-spacing:0.5px;}
.host-tag{font-family:'Space Mono',monospace; font-size:12px; color:var(--muted); font-weight:400; margin-left:auto;}
.wrap{max-width:820px;margin:0 auto;padding:24px 20px 60px;}
.card{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 30px rgba(0,0,0,0.35); margin-bottom:18px;}
h2{color:var(--gold); font-size:16px; font-weight:800; margin-bottom:14px; text-transform:uppercase; letter-spacing:1px;}
label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;}
textarea,select,input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:14px; background:#0F1428; color:var(--ink);}
textarea{min-height:140px;resize:vertical;}
textarea::placeholder{color:var(--muted);}
.btn{display:inline-block;padding:13px 22px;border:none;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;background:var(--gold);color:#1B1400; text-transform:uppercase; letter-spacing:0.5px; transition:transform .12s;}
.btn:active{transform:scale(0.97);}
.btn-amber{background:var(--magenta); color:white;}
.btn-full{width:100%;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.marquee-frame{position:relative; padding:26px 10px; text-align:center; margin-bottom:6px;}
.marquee-frame::before,.marquee-frame::after{content:'';position:absolute;left:0;right:0;height:2px;background:
  radial-gradient(circle,var(--gold) 2.5px, transparent 3px); background-size:22px 100%; }
.marquee-frame::before{top:0; animation:bulbFlash 1.4s infinite;}
.marquee-frame::after{bottom:0; animation:bulbFlash 1.4s infinite 0.7s;}
.room-code{font-family:'Space Mono',monospace; font-size:52px;font-weight:700;letter-spacing:12px;color:var(--gold); text-shadow:0 0 20px rgba(255,201,60,0.5);}
@keyframes bulbFlash{0%,100%{opacity:1}50%{opacity:0.35}}
.player-chip{display:inline-flex;flex-direction:column;align-items:center;gap:6px;padding:10px 14px;border-radius:16px;font-size:13px;font-weight:700;margin:4px; color:#0B0E1A; animation:popIn .3s ease;}
.player-avatar{width:128px;height:128px;border-radius:16px;object-fit:cover;border:3px solid rgba(255,255,255,0.6);}
.game-players-bar{display:flex;flex-direction:column;gap:10px;}
.game-player-chip{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 8px;border-radius:16px;background:#0F1428;border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--ink);width:100%;}
.game-player-chip .gp-score{font-family:'Space Mono',monospace;color:var(--gold);font-size:15px;}
.game-layout{display:flex;gap:22px;align-items:flex-start;}
.game-main{flex:1;min-width:0;}

.game-sidebar-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);text-align:center;margin-bottom:12px;}
@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}

.timer-wrap{display:flex;justify-content:center;margin-bottom:18px;}
.timer-ring{position:relative;width:96px;height:96px;}
.timer-ring svg{transform:rotate(-90deg);}
.timer-ring circle{fill:none;stroke-width:8;}
.timer-ring .track{stroke:var(--line);}
.timer-ring .bar{stroke:var(--teal); stroke-linecap:round; transition:stroke-dashoffset 0.2s linear, stroke 0.3s;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:28px;font-weight:700;}

.opt-row .shape{font-size:18px;}

.podium{display:flex;align-items:flex-end;justify-content:center;gap:14px;margin:20px 0 24px;}
.pod-step{flex:1;max-width:170px;border-radius:12px 12px 0 0;text-align:center;padding:14px 6px 10px;position:relative;animation:slideUp .5s ease backwards;}
.pod-step .pname{font-weight:800;font-size:13px;margin-bottom:4px;}
.pod-step .pscore{font-family:'Space Mono',monospace;font-weight:700;font-size:15px;}

function onPresetChange() {

  const uploadPicker = document.getElementById('upload-picker');

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function populateCpgCategories() {

  catSel.innerHTML = CATEGORIES.map(c => `<option value="${c.key}">${c.icon} ${c.key}</option>`).join('');
  onCpgCategoryChange();
}

function onCpgCategoryChange() {
  const cat = CATEGORIES.find(c => c.key === document.getElementById('cpg-category').value);
  const condSel = document.getElementById('cpg-condition');
  const conditions = [];
  Object.keys(cat.subcats).forEach(sub => cat.subcats[sub].forEach(c => conditions.push(c)));
  condSel.innerHTML = conditions.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');

async function sbFetch(path, opts={}) {
  const token = (_session && _session.access_token) || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type':'application/json',
      'Prefer': opts.prefer || 'return=representation', ...(opts.headers||{}) }
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || `Supabase error ${res.status}`); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

let _cachedKey = null;
async function getAnthropicKey() {
  if (_cachedKey) return _cachedKey;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/app_config?key=eq.anthropic_api_key&select=value`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (res.ok) {
    const data = await res.json();
    if (data && data[0] && data[0].value) { _cachedKey = data[0].value; return _cachedKey; }
  }
  throw new Error('AI generation is temporarily unavailable.');
}

let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}
function playTone(freq, duration, type='sine', volume=0.2) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function playTick(urgent) { playTone(urgent ? 1200 : 800, 0.08, 'square', 0.12); }
function playChime(correct) {
  if (correct) { playTone(880, 0.15); setTimeout(()=>playTone(1320, 0.2), 100); }
  else { playTone(220, 0.25, 'sawtooth', 0.15); }
}
function playFanfare() {
  const notes = [523.25, 659.25, 783.99, 1046.5];
  notes.forEach((f,i) => setTimeout(()=>playTone(f, 0.3, 'triangle', 0.18), i*120));
}

function fireConfetti(intensity) {
  const count = intensity === 'big' ? 140 : intensity === 'medium' ? 70 : 30;
  let canvas = document.getElementById('confetti-canvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'confetti-canvas';
    canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
    document.body.appendChild(canvas);
  }
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#FFC93C','#FF3D7F','#2FE6C4','#7B61FF'];
  const particles = Array.from({length:count}, () => ({
    x: Math.random()*canvas.width,
    y: -20 - Math.random()*canvas.height*0.3,
    r: 4 + Math.random()*5,
    color: colors[Math.floor(Math.random()*colors.length)],
    vy: 2 + Math.random()*3,
    vx: (Math.random()-0.5)*2,
    rot: Math.random()*360,
    vrot: (Math.random()-0.5)*10
  }));
  const start = Date.now();
  const duration = 3500;
  function frame() {
    const elapsed = Date.now() - start;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6);
      ctx.restore();
    });
    if (elapsed < duration) requestAnimationFrame(frame);
    else { ctx.clearRect(0,0,canvas.width,canvas.height); canvas.remove(); }
  }
  requestAnimationFrame(frame);
}

function parseFirstJSONArray(raw) {
  let s = raw.replace(/```json|```/g,'').trim();
  const start = s.indexOf('[');
  if (start===-1) throw new Error('No JSON array found in AI response');
  let depth=0, end=-1;
  for (let i=start;i<s.length;i++){ if(s[i]==='[')depth++; else if(s[i]===']'){depth--; if(depth===0){end=i;break;}} }
  if (end===-1) throw new Error('Unterminated JSON array');
  return JSON.parse(s.slice(start,end+1));
}

function genRoomCode() {
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c=''; for(let i=0;i<4;i++) c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}

let _genTrickleInterval = null;
function setGenProgress(pct, label) {
  document.getElementById('gen-progress-wrap').classList.remove('hidden');
  document.getElementById('gen-progress-bar').style.width = pct + '%';
  document.getElementById('gen-progress-label').textContent = label;
}
function startGenTrickle(from, ceiling, label) {
  clearInterval(_genTrickleInterval);
  let pct = from;
  setGenProgress(pct, label);
  _genTrickleInterval = setInterval(() => {
    pct += (ceiling - pct) * 0.06;
    setGenProgress(pct, label);
  }, 400);
}
function stopGenTrickle() {
  clearInterval(_genTrickleInterval);
  _genTrickleInterval = null;
}
function resetGenProgress() {
  stopGenTrickle();
  document.getElementById('gen-progress-wrap').classList.add('hidden');
  document.getElementById('gen-progress-bar').style.width = '0%';
}

  const hName = (_profile && _profile.display_name) || _session.user.email;
  const hAvatar = (_profile && _profile.avatar_url) || null;
  const hprows = await sbFetch(`quiz_players?on_conflict=room_id,user_id`, { method:'POST',
    headers:{ 'Prefer':'resolution=merge-duplicates,return=representation' },
    body: JSON.stringify({ room_id:_room.id, user_id:_session.user.id, name:hName, avatar_url:hAvatar }) });
  _hostPlayerId = hprows[0].id;
}

function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function generateQuiz() {
  const errEl = document.getElementById('setup-err');
  errEl.classList.add('hidden');
  const mode = document.getElementById('package-preset').value;
  const packageText = document.getElementById('package-text').value.trim();
  const topicText = document.getElementById('topic-input').value.trim();
  const uploadFiles = Array.from(document.getElementById('upload-files').files || []);
  const numQ = parseInt(document.getElementById('num-questions').value) || 5;
  _questionDuration = parseInt(document.getElementById('q-duration').value) || 20;
  const difficulty = document.getElementById('difficulty').value;
  const DIFFICULTY_TEXT = {
    easy: 'Keep questions easy — straightforward recall of clearly-stated facts, simple wording, and distractors that are obviously wrong.',
    standard: 'Use a standard difficulty — a normal mix of recall and light application, with plausible but fair distractors.',
    hard: 'Make questions hard — require applying concepts rather than pure recall, with distractors that are plausible and require real understanding to rule out.',
    extreme: 'Make questions extremely difficult — nuanced edge cases, closely-related distractors that differ only in fine detail, and questions that demand deep, precise understanding rather than surface familiarity.'
  };
  const difficultyInstruction = DIFFICULTY_TEXT[difficulty] || DIFFICULTY_TEXT.standard;

  if (mode === 'upload' && !uploadFiles.length) { errEl.textContent='Upload at least one file first.'; errEl.classList.remove('hidden'); return; }
  if (mode === 'topic' && !topicText) { errEl.textContent='Enter a topic first.'; errEl.classList.remove('hidden'); return; }
  if ((mode === 'custom' || mode === 'cpg') && !packageText) { errEl.textContent='Paste some reference material first.'; errEl.classList.remove('hidden'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true; btn.textContent = '✦ Generating…';
  resetGenProgress();
  setGenProgress(5, 'Preparing…');
  try {
    const apiKey = await getAnthropicKey();
    let systemPrompt, userContent, sourceSummary;

    if (mode === 'topic') {
      systemPrompt = `You write multiple-choice quiz questions on a given topic. Respond with valid JSON only — no markdown, no preamble, no commentary before or after the JSON. Format: [{"question":"...","options":["a","b","c","d"],"correct_index":0}, ...]. Rules: (1) Generate exactly ${numQ} questions. (2) Each question has exactly 4 options. (3) correct_index is 0-based and must be factually correct. (4) Vary question style (recall, application, scenario-based) where the topic supports it. (5) If the topic involves recent, current, or time-sensitive information (e.g. "current events", ongoing tournaments or competitions, recent news), use the web search tool to verify facts before writing questions. For timeless or historical topics, rely on your own knowledge without searching. (6) Only include facts you are confident are accurate — do not invent statistics, dates, or names. (7) ${difficultyInstruction}`;
      userContent = `Topic: ${topicText}\n\nGenerate the quiz as JSON.`;
      sourceSummary = `Topic: ${topicText}`;
    } else if (mode === 'upload') {
      systemPrompt = `You write multiple-choice quiz questions from reference material supplied as documents/images${packageText ? ' and additional instructions' : ''}. Respond with valid JSON only — no markdown, no preamble. Format: [{"question":"...","options":["a","b","c","d"],"correct_index":0}, ...]. Rules: (1) Generate exactly ${numQ} questions. (2) Each question has exactly 4 options. (3) correct_index is 0-based and must be accurate per the source material. (4) Questions must be answerable strictly from the material provided — do not invent facts. (5) Vary question style (recall, application, scenario-based) where the material supports it. (6) ${difficultyInstruction}`;
      const blocks = [];
      for (let i=0; i<uploadFiles.length; i++) {
        const file = uploadFiles[i];
        setGenProgress(8 + (i / uploadFiles.length) * 15, `Reading files… (${i+1}/${uploadFiles.length})`);
        const b64 = await fileToBase64(file);
        if (file.type === 'application/pdf') blocks.push({ type:'document', source:{ type:'base64', media_type:'application/pdf', data:b64 } });
        else blocks.push({ type:'image', source:{ type:'base64', media_type: file.type || 'image/png', data:b64 } });
      }
      if (packageText) blocks.push({ type:'text', text: packageText });
      blocks.push({ type:'text', text:'Generate the quiz as JSON from the material above.' });
      userContent = blocks;
      sourceSummary = `Uploaded: ${uploadFiles.map(f=>f.name).join(', ')}` + (packageText ? ` + notes: ${packageText.slice(0,500)}` : '');
    } else {
      systemPrompt = `You write multiple-choice quiz questions from reference material. Respond with valid JSON only — no markdown, no preamble. Format: [{"question":"...","options":["a","b","c","d"],"correct_index":0}, ...]. Rules: (1) Generate exactly ${numQ} questions. (2) Each question has exactly 4 options. (3) correct_index is 0-based and must be accurate per the source material. (4) Questions must be answerable strictly from the material provided — do not invent facts. (5) Vary question style (recall, application, scenario-based) where the material supports it. (6) ${difficultyInstruction}`;
      userContent = `Reference material:\n\n${packageText}\n\nGenerate the quiz as JSON.`;
      sourceSummary = packageText.slice(0,2000);
    }

    startGenTrickle(30, 82, '✦ Calling AI…');
    const requestBody = { model:'claude-sonnet-4-6', max_tokens: 4000, system: systemPrompt, messages:[{role:'user', content:userContent}] };
    if (mode === 'topic') {
      requestBody.tools = [{ type:'web_search_20250305', name:'web_search', max_uses:5 }];
    }
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify(requestBody)
    });
    stopGenTrickle();
    if (!response.ok) throw new Error('AI request failed: ' + response.status);
    setGenProgress(85, 'Parsing response…');
    const data = await response.json();
    const text = (data.content||[]).map(b=>b.text||'').join('');
    const parsed = parseFirstJSONArray(text);
    if (!Array.isArray(parsed) || !parsed.length) throw new Error('AI returned no questions');
    _questions = parsed.map((q,i)=>({ order_index:i, question_text:q.question, options:q.options, correct_index:q.correct_index }));

    setGenProgress(90, 'Creating room…');
    let code, room;
    for (let attempt=0; attempt<5; attempt++) {
      code = genRoomCode();
      try {
        const rows = await sbFetch('quiz_rooms', { method:'POST', body: JSON.stringify({ code, host_user_id:_session.user.id, package_source: sourceSummary.slice(0,2000), status:'lobby', current_question_index:-1, question_duration_seconds:_questionDuration }) });
        room = rows[0]; break;
      } catch(e) { if (attempt===4) throw e; }
    }
    _room = room;
    setGenProgress(95, 'Saving questions…');
    await sbFetch('quiz_questions', { method:'POST', prefer:'return=minimal', body: JSON.stringify(_questions.map(q=>({ room_id:_room.id, order_index:q.order_index, question_text:q.question_text, options:q.options, correct_index:q.correct_index }))) });

    _hostPlays = document.getElementById('host-mode').value === 'play';
    _scoringMode = document.getElementById('scoring-mode').value;
    if (_hostPlays) {
      await joinHostAsPlayer();
    }
    setGenProgress(100, 'Done!');

    document.getElementById('screen-setup').classList.add('hidden');
    document.getElementById('screen-lobby').classList.remove('hidden');
    document.getElementById('room-code-display').textContent = _room.code;
    renderJoinQR();
    subscribeLobby();
  } catch(e) {
    resetGenProgress();
    errEl.textContent = e.message; errEl.classList.remove('hidden');
  } finally {
    btn.disabled=false; btn.textContent='✦ Generate Quiz';
  }
}

function subscribeLobby() {
  refreshLobbyPlayers();
  _playersChannel = _sb.channel('room-players-'+_room.id)
    .on('postgres_changes', { event:'*', schema:'public', table:'quiz_players', filter:`room_id=eq.${_room.id}` }, refreshLobbyPlayers)
    .subscribe();
}

async function refreshLobbyPlayers() {
  const rows = await sbFetch(`quiz_players?room_id=eq.${_room.id}&select=name,score,avatar_url&order=joined_at.asc`);
  const colors = ['var(--magenta)','var(--teal)','var(--gold)','var(--violet)'];
  const textDark = ['','','color:#1B1400;',''];
  document.getElementById('lobby-players').innerHTML = rows.length
    ? rows.map((p,i)=>`<span class="player-chip" style="background:${colors[i%4]};${textDark[i%4]}">${p.avatar_url?`<img src="${escapeHtml(p.avatar_url)}" class="player-avatar" alt="">`:''}${escapeHtml(p.name)}</span>`).join('')
    : '<div class="status-line">Waiting for players…</div>';
}

async function renderGamePlayers() {
  const rows = await sbFetch(`quiz_players?room_id=eq.${_room.id}&select=name,score,avatar_url&order=score.desc`);
  const bar = document.getElementById('game-players-bar');
  if (!bar) return;
  bar.innerHTML = rows.map(p=>`<span class="game-player-chip">${p.avatar_url?`<img src="${escapeHtml(p.avatar_url)}" class="player-avatar" alt="">`:''}${escapeHtml(p.name)}<span class="gp-score">${p.score}</span></span>`).join('');
}

function renderJoinQR() {
  const joinUrl = new URL('quiz_player.html?code=' + _room.code, window.location.href).href;
  const container = document.getElementById('qr-code');
  container.innerHTML = '';
  const canvas = document.createElement('canvas');
  container.appendChild(canvas);
  QRCode.toCanvas(canvas, joinUrl, { width: 200, margin: 1, color: { dark: '#FFC93C', light: '#1B2140' } }, function (err) {
    if (err) container.innerHTML = '<div class="status-line">(QR code unavailable — use the room code above)</div>';
  });
}

function startTimerUI(startedAtISO, durationSec) {
  clearInterval(_timerInterval);
  const circle = document.getElementById('timer-bar');
  const numEl = document.getElementById('timer-num');
  const circumference = 2 * Math.PI * 42;
  circle.style.strokeDasharray = circumference;
  let _lastWholeSecond = null;
  function tick() {
    const elapsed = (Date.now() - new Date(startedAtISO).getTime()) / 1000;
    const remaining = Math.max(0, durationSec - elapsed);
    const frac = remaining / durationSec;
    circle.style.strokeDashoffset = circumference * (1 - frac);
    circle.style.stroke = remaining <= 5 ? 'var(--magenta)' : 'var(--teal)';
    const wholeRemaining = Math.ceil(remaining);
    numEl.textContent = wholeRemaining;
    if (wholeRemaining !== _lastWholeSecond && wholeRemaining > 0) {
      _lastWholeSecond = wholeRemaining;
      if (wholeRemaining <= 5) playTick(true);
    }
    if (remaining <= 0) {
      clearInterval(_timerInterval);
      if (!_revealing) { _revealing = true; revealAnswer(); }
    }
  }
  tick();
  _timerInterval = setInterval(tick, 200);
}

async function startGame() {
  if (!_hostPlays) {
    const playerRows = await sbFetch(`quiz_players?room_id=eq.${_room.id}&select=user_id`);
    const otherPlayers = playerRows.filter(p => p.user_id !== _session.user.id);
    if (!otherPlayers.length) {
      _hostPlays = true;
      await joinHostAsPlayer();
    }
  }
  const startedAt = new Date().toISOString();
  await sbFetch(`quiz_rooms?id=eq.${_room.id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ status:'live', current_question_index:0, question_started_at:startedAt, question_duration_seconds:_questionDuration }) });
  _room.question_started_at = startedAt; _room.question_duration_seconds = _questionDuration;
  _curIdx = 0;
  document.getElementById('screen-lobby').classList.add('hidden');
  document.getElementById('screen-game').classList.remove('hidden');
  if (_playersChannel) _sb.removeChannel(_playersChannel);
  showQuestion();
  subscribeAnswers();
}

const QUESTION_PALETTE = [
  ['#E8637F','#C2465F','#fff'],
  ['#3FBFAE','#2C9686','#fff'],
  ['#E8AC4E','#C68B2E','#2A1B00'],
  ['#8677D9','#665BB3','#fff'],
];

function showQuestion() {
  _revealing = false;
  _advancing = false;
  clearTimeout(_autoAdvanceTimer);
  clearInterval(_autoAdvanceCountdownInterval);
  document.getElementById('next-btn').textContent = 'Next Question ▶';
  renderGamePlayers();
  const q = _questions[_curIdx];
  const shapes = ['▲','◆','●','■'];
  const pal = QUESTION_PALETTE[_curIdx % QUESTION_PALETTE.length];
  const optsEl = document.getElementById('q-options');
  optsEl.style.setProperty('--qc1', pal[0]);
  optsEl.style.setProperty('--qc2', pal[1]);
  optsEl.style.setProperty('--qtext', pal[2]);
  document.getElementById('game-progress').textContent = `Question ${_curIdx+1} of ${_questions.length}`;
  document.getElementById('q-text').textContent = q.question_text;
  optsEl.innerHTML = q.options.map((o,i)=>`<div class="opt-row" id="opt-${i}"><span class="shape">${shapes[i]}</span>${escapeHtml(o)}<span class="opt-count" id="opt-count-${i}"></span></div>`).join('');
  optsEl.classList.toggle('hidden', _hostPlays);
  document.getElementById('answer-count').textContent = '';
  document.getElementById('reveal-btn').classList.remove('hidden');
  document.getElementById('next-btn').classList.add('hidden');
  _hostAnswered = false;
  const hostPanel = document.getElementById('host-play-panel');
  if (_hostPlays) {
    hostPanel.classList.remove('hidden');
    const hostOptsEl = document.getElementById('host-options');
    hostOptsEl.style.setProperty('--qc1', pal[0]);
    hostOptsEl.style.setProperty('--qc2', pal[1]);
    hostOptsEl.style.setProperty('--qtext', pal[2]);
    hostOptsEl.innerHTML = q.options.map((o,i)=>`<button type="button" class="opt-row clickable" id="host-opt-${i}" onclick="submitHostAnswer(${i})"><span class="shape">${shapes[i]}</span>${escapeHtml(o)}</button>`).join('');
  } else {
    hostPanel.classList.add('hidden');
  }
  startTimerUI(_room.question_started_at, _room.question_duration_seconds);
}

function subscribeAnswers() {
  if (_answersChannel) _sb.removeChannel(_answersChannel);
  _answersChannel = _sb.channel('room-answers-'+_room.id)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'quiz_answers', filter:`room_id=eq.${_room.id}` }, updateAnswerCount)
    .subscribe();
  updateAnswerCount();
}

async function updateAnswerCount() {
  const qid = await currentQuestionId();
  const answers = await sbFetch(`quiz_answers?question_id=eq.${qid}&select=selected_index`);
  const players = await sbFetch(`quiz_players?room_id=eq.${_room.id}&select=id`);
  document.getElementById('answer-count').textContent = `${answers.length} of ${players.length} answered`;
  const revealBtn = document.getElementById('reveal-btn');
  if (!_revealing && players.length > 0 && answers.length >= players.length && !revealBtn.classList.contains('hidden')) {
    _revealing = true;
    revealAnswer();
  }
}

let _qidCache = {};
async function currentQuestionId() {
  const key = _curIdx;
  if (_qidCache[key]) return _qidCache[key];
  const rows = await sbFetch(`quiz_questions?room_id=eq.${_room.id}&order_index=eq.${_curIdx}&select=id`);
  _qidCache[key] = rows[0].id;
  return _qidCache[key];
}

function manualReveal() {
  if (_revealing) return;
  _revealing = true;
  revealAnswer();
}

async function submitHostAnswer(selectedIndex) {
  if (_hostAnswered || !_hostPlayerId) return;
  _hostAnswered = true;
  document.querySelectorAll('#host-options .opt-row').forEach((el,i)=>{ el.disabled = true; if (i===selectedIndex) el.classList.add('selected'); });
  const qid = await currentQuestionId();
  const q = _questions[_curIdx];
  try {
    await sbFetch('quiz_answers', { method:'POST', prefer:'return=minimal',
      body: JSON.stringify({ room_id:_room.id, question_id:qid, player_id:_hostPlayerId, selected_index:selectedIndex, is_correct: selectedIndex===q.correct_index }) });
  } catch(e) { /* likely already answered — ignore */ }
}

async function revealAnswer() {
  clearInterval(_timerInterval);
  const q = _questions[_curIdx];
  const qid = await currentQuestionId();
  const answers = await sbFetch(`quiz_answers?question_id=eq.${qid}&select=selected_index,player_id,answered_at&order=answered_at.asc`);
  if (_hostPlays && _hostPlayerId) {
    const hostAnswer = answers.find(a => a.player_id === _hostPlayerId);
    playChime(!!hostAnswer && hostAnswer.selected_index === q.correct_index);
  } else {
    playChime(true);
  }
  const counts = q.options.map((_,i)=> answers.filter(a=>a.selected_index===i).length);
  counts.forEach((c,i)=>{ document.getElementById('opt-count-'+i).textContent = c; });
  q.options.forEach((_,i)=>{
    const el = document.getElementById('opt-'+i);
    if (i === q.correct_index) el.classList.add('correct'); else el.classList.add('faded');
    const hostEl = document.getElementById('host-opt-'+i);
    if (hostEl) {
      hostEl.disabled = true;
      if (i === q.correct_index) hostEl.classList.add('correct'); else hostEl.classList.add('faded');
    }
  });

  const deltas = {};
  if (_scoringMode === 'speed') {
    const allPlayers = await sbFetch(`quiz_players?room_id=eq.${_room.id}&select=id`);
    const answeredIds = new Set(answers.map(a=>a.player_id));
    const correctOrdered = answers.filter(a=>a.selected_index===q.correct_index);
    correctOrdered.forEach((a,i)=>{ deltas[a.player_id] = i===0 ? 10 : (i===1 ? 5 : 0); });
    answers.filter(a=>a.selected_index!==q.correct_index).forEach(a=>{ deltas[a.player_id] = -5; });
    allPlayers.forEach(p=>{ if (!answeredIds.has(p.id)) deltas[p.id] = -5; });
  } else {
    answers.filter(a=>a.selected_index===q.correct_index).forEach(a=>{ deltas[a.player_id] = 10; });
  }

  for (const pid of Object.keys(deltas)) {
    const delta = deltas[pid];
    if (!delta) continue;
    const rows = await sbFetch(`quiz_players?id=eq.${pid}&select=score`);
    const cur = (rows[0] && rows[0].score) || 0;
    await sbFetch(`quiz_players?id=eq.${pid}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ score: cur+delta }) });
  }
  renderGamePlayers();

  document.getElementById('reveal-btn').classList.add('hidden');
  document.getElementById('next-btn').classList.remove('hidden');
  scheduleAutoAdvance();
}

function scheduleAutoAdvance() {
  clearTimeout(_autoAdvanceTimer);
  clearInterval(_autoAdvanceCountdownInterval);
  let secondsLeft = 6;
  const btn = document.getElementById('next-btn');
  btn.textContent = `Next Question ▶ (${secondsLeft})`;
  _autoAdvanceCountdownInterval = setInterval(() => {
    secondsLeft--;
    if (secondsLeft > 0) btn.textContent = `Next Question ▶ (${secondsLeft})`;
  }, 1000);
  _autoAdvanceTimer = setTimeout(triggerNext, 6000);
}

function triggerNext() {
  if (_advancing) return;
  _advancing = true;
  clearTimeout(_autoAdvanceTimer);
  clearInterval(_autoAdvanceCountdownInterval);
  nextQuestion();
}

async function nextQuestion() {
  _curIdx++;
  if (_curIdx >= _questions.length) {
    clearInterval(_timerInterval);
    await sbFetch(`quiz_rooms?id=eq.${_room.id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ status:'ended' }) });
    if (_answersChannel) _sb.removeChannel(_answersChannel);
    showLeaderboard();
    return;
  }
  const startedAt = new Date().toISOString();
  await sbFetch(`quiz_rooms?id=eq.${_room.id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ current_question_index: _curIdx, question_started_at:startedAt, question_duration_seconds:_questionDuration }) });
  _room.question_started_at = startedAt;
  showQuestion();
}

async function showLeaderboard() {
  document.getElementById('screen-game').classList.add('hidden');
  document.getElementById('screen-end').classList.remove('hidden');
  const rows = await sbFetch(`quiz_players?room_id=eq.${_room.id}&select=name,score,avatar_url&order=score.desc&limit=3`);
  document.getElementById('podium').innerHTML = rows.map((p,i)=>`<div class="pod-step pod-${i+1}">${p.avatar_url?`<img src="${escapeHtml(p.avatar_url)}" class="pod-avatar" alt="">`:''}<div class="pname">${escapeHtml(p.name)}</div><div class="pscore">${p.score}</div></div>`).join('');
  playFanfare();
  fireConfetti('big');
}
