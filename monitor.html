<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Patient Monitor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; height: 100dvh; }
body { background: #0a0d14; color: #e0e0e0; font-family: 'Courier New', monospace; height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; top: 0; left: 0; }
#topbar { background: #060910; border-bottom: 2px solid #1a2a3a; padding: 5px 12px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; height: 36px; }
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-logo { background: #003a6e; border: 1px solid #0066bb; border-radius: 4px; padding: 3px 7px; font-size: 10px; font-weight: 900; color: #4fc3f7; letter-spacing: 1px; }
#pt-demographics { font-size: 12px; font-weight: 700; color: #e0e0e0; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; animation: blink 2s infinite; }
.status-dot.offline { background: #555; animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
#status-text { font-size: 10px; color: #666; letter-spacing: 0.5px; text-transform: uppercase; }
#connect-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 32px 24px; }
#connect-screen h2 { font-size: 16px; color: #4fc3f7; letter-spacing: 1px; text-transform: uppercase; }
#connect-screen p { font-size: 12px; color: #666; text-align: center; }
#code-input { background: #0d1520; border: 2px solid #1a3a5a; color: #fff; font-family: 'Courier New', monospace; font-size: 36px; font-weight: 900; letter-spacing: 10px; text-align: center; padding: 14px 20px; width: 220px; outline: none; border-radius: 4px; }
#code-input:focus { border-color: #4fc3f7; }
#connect-btn { background: #003a6e; border: 1px solid #0066bb; color: #4fc3f7; font-size: 13px; font-weight: 700; padding: 12px 32px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; border-radius: 4px; }
#connect-btn:active { background: #00264d; }
#connect-error { color: #ff6b6b; font-size: 12px; text-align: center; display: none; }
#monitor-screen { flex: 1; display: none; flex-direction: column; min-height: 0; }
#monitor-main { flex: 1; display: flex; flex-direction: row; min-height: 0; overflow: hidden; }
#ecg-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; background: #060606; border-right: 2px solid #0d1f35; overflow: hidden; }
#vitals-panel { width: 155px; flex-shrink: 0; display: flex; flex-direction: column; background: #080c14; overflow: hidden; }
#bottom-strip { flex-shrink: 0; background: #0a0d14; border-top: 2px solid #0d1f35; display: flex; flex-direction: row; flex-wrap: nowrap; min-height: 52px; max-height: 68px; }
.vital-block { display: flex; flex-direction: column; border-bottom: 2px solid #0d1f35; flex: 1; min-height: 0; overflow: hidden; }
.vital-block.hidden-cell { opacity: 0.25; }
.vital-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 7px 1px; flex-shrink: 0; }
.vital-value { flex: 1; display: flex; align-items: center; padding: 0 7px 3px; font-size: clamp(16px, 2.8vw, 28px); font-weight: 900; line-height: 1; font-family: 'Courier New', monospace; min-height: 0; overflow: hidden; }
.vital-unit { font-size: 9px; font-weight: 400; opacity: 0.7; margin-left: 3px; align-self: flex-end; padding-bottom: 4px; flex-shrink: 0; }
.vital-dash { color: #1a2a3a; font-size: 16px; letter-spacing: 3px; }
.vital-hr   .vital-label { background: #1a1a1a; color: #ffffff; }
.vital-hr   .vital-value { color: #ffffff; background: #0f0f0f; }
.vital-nibp .vital-label { background: #1a3a00; color: #7fff00; }
.vital-nibp .vital-value { color: #7fff00; background: #0a1f00; }
.vital-spo2 .vital-label { background: #003a5a; color: #4fc3f7; }
.vital-spo2 .vital-value { color: #4fc3f7; background: #001e30; }
.vital-rr   .vital-label { background: #3a2a00; color: #ffd54f; }
.vital-rr   .vital-value { color: #ffd54f; background: #1e1600; }
.vital-etco2 .vital-label { background: #3a1a00; color: #ff8a65; }
.vital-etco2 .vital-value { color: #ff8a65; background: #1e0e00; }
.bottom-card { flex: 1; min-width: 0; border-right: 1px solid #1a2a3a; padding: 4px 8px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
.bottom-card:last-child { border-right: none; }
.bottom-card.hidden-card { opacity: 0.2; }
.bc-label { font-size: 8px; font-weight: 700; color: #4a6a8a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1px; white-space: nowrap; }
.bc-value { font-size: 16px; font-weight: 700; color: #c0d4e8; line-height: 1; }
.bc-unit { font-size: 8px; color: #4a6a8a; margin-top: 1px; }
.bc-sub { font-size: 9px; color: #7a9ab8; }
.bc-dash { font-size: 14px; color: #1a2a3a; letter-spacing: 3px; }
.new-reveal { animation: revealFlash 1.5s ease forwards; }
@keyframes revealFlash { 0%{box-shadow:0 0 0 2px #4fc3f7} 100%{box-shadow:none} }
#session-footer { display: none; }
</style>

const ZOLL_PARAMS = VITAL_PARAMS;
const CLINICAL_PARAMS = [

const ECG_BASE = 'https://1984tpearson.github.io/AV/ecg/';

function getECGUrl(rhythmStr) {
  if (!rhythmStr) return null;
  const r = rhythmStr.toLowerCase();
  for (const [key, url] of Object.entries(ECG_MAP)) {
    if (r.includes(key)) return url;
  }
  return null;
}

let sessionCode = null;
let scenario = null;
let pollTimer = null;
let lastRevealedStr = null;
let prevRevealed = {};

async function sbGet(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('session');
  if (code && /^\d{6}$/.test(code)) {
    document.getElementById('code-input').value = code;
    connectSession();
  }
});

async function connectSession() {
  const code = document.getElementById('code-input').value.trim();
  if (code.length !== 6) return;
  const errEl = document.getElementById('connect-error');
  errEl.style.display = 'none';
  document.getElementById('connect-btn').textContent = 'Connecting\u2026';
  try {
    const rows = await sbGet(`active_sessions?session_code=eq.${code}&select=*`);
    if (!rows || rows.length === 0) {
      errEl.style.display = 'block';
      document.getElementById('connect-btn').textContent = 'Connect';
      return;
    }
    sessionCode = code;
    const session = rows[0];
    const scenRows = await sbGet(`scenarios?id=eq.${encodeURIComponent(session.scenario_id)}&select=*`);
    if (scenRows && scenRows.length > 0) scenario = scenRows[0];
    setDemographics(scenario);
    document.getElementById('connect-screen').style.display = 'none';
    document.getElementById('monitor-screen').style.display = 'flex';
    document.getElementById('session-footer').textContent = `Session ${code}`;
    buildMonitorScreens();
    prevRevealed = {};
    renderRevealed(session.revealed || {});
    prevRevealed = session.revealed || {};
    startPolling();
  } catch(e) {
    errEl.textContent = 'Connection failed: ' + e.message;
    errEl.style.display = 'block';
    document.getElementById('connect-btn').textContent = 'Connect';
  }
}

function setDemographics(s) {
  if (!s) return;
  let demo = '';
  const sub = s.subtitle || '';
  const m = sub.match(/^(\d+\s*(?:yo|year[s]?\s*old)?)\s*(male|female|m\b|f\b)/i);
  if (m) demo = m[1].trim() + ' ' + m[2].trim();
  const dispatch = s.dispatch || '';
  const nameMatch = dispatch.match(/(?:^|\n|,\s*)([A-Z][a-z]+(?:\s[A-Z][a-z]+)?)\s*(?:,|\s+is\s|\s+presents|\s+called|\s+a\s)/);
  let name = '';
  if (nameMatch) name = nameMatch[1];
  const el = document.getElementById('pt-demographics');
  el.textContent = [name, demo].filter(Boolean).join(' \u2014 ') || 'Patient';
}

function buildMonitorScreens() {
  const vitals = (scenario && scenario.vitals) || {};
  const vitalsPanel = document.getElementById('vitals-panel');
  vitalsPanel.innerHTML = '';
  VITAL_PARAMS.forEach(p => {
    vitalsPanel.appendChild(makeVitalBlock(p, vitals[p.key], false));
  });
  const bottomStrip = document.getElementById('bottom-strip');
  bottomStrip.innerHTML = '';
  BOTTOM_PARAMS.forEach(p => {
    const val = vitals[p.key];
    if (!val && val !== 0) return;
    bottomStrip.appendChild(makeBottomCard(p, val, false));
  });
}

function makeVitalBlock(param, val, revealed) {
  const block = document.createElement('div');
  block.className = `vital-block ${param.cls}`;
  block.id = `zc-${param.key}`;
  if (!revealed) {
    block.classList.add('hidden-cell');
    block.innerHTML = `<div class="vital-label">${param.label}</div><div class="vital-value"><span class="vital-dash">- -</span></div>`;
  } else {
    block.innerHTML = `<div class="vital-label">${param.label}</div><div class="vital-value">${val}<span class="vital-unit">${param.unit}</span></div>`;
  }
  return block;
}

function makeBottomCard(param, val, revealed) {
  const card = document.createElement('div');
  card.className = 'bottom-card';
  card.id = `cc-${param.key}`;
  if (!revealed) {
    card.classList.add('hidden-card');
    card.innerHTML = `<div class="bc-label">${param.label}</div><div class="bc-dash">\u2014 \u2014</div>`;
  } else if (param.isGCS && typeof val === 'object') {
    card.innerHTML = `<div class="bc-label">${param.label}</div><div class="bc-value">${val.total}<span style="font-size:10px;color:#4a6a8a"> /15</span></div><div class="bc-sub">E${val.E} V${val.V} M${val.M}</div>`;
  } else {
    card.innerHTML = `<div class="bc-label">${param.label}</div><div class="bc-value">${val}</div>${param.unit ? `<div class="bc-unit">${param.unit}</div>` : ''}`;
  }
  return card;
}

function makeClinicalCard(param, val, revealed) {
  if (param.isECG) { const d = document.createElement('div'); d.style.display='none'; return d; }
  return makeBottomCard(param, val, revealed);
}

function makeZollCell(param, val, revealed) {
  return makeVitalBlock(param, val, revealed);
}

function renderRevealed(revealed) {
  if (!scenario) return;
  const vitals = scenario.vitals || {};
  VITAL_PARAMS.forEach(p => {
    const block = document.getElementById(`zc-${p.key}`);
    if (!block) return;
    const isRevealed = !!revealed[p.key];
    const wasRevealed = !!prevRevealed[p.key];
    if (isRevealed !== wasRevealed) {
      const newBlock = makeVitalBlock(p, vitals[p.key], isRevealed);
      if (isRevealed && !wasRevealed) newBlock.classList.add('new-reveal');
      block.replaceWith(newBlock);
    }
  });
  BOTTOM_PARAMS.forEach(p => {
    const card = document.getElementById(`cc-${p.key}`);
    if (!card) return;
    const isRevealed = !!revealed[p.key];
    const wasRevealed = !!prevRevealed[p.key];
    if (isRevealed !== wasRevealed) {
      const newCard = makeBottomCard(p, vitals[p.key], isRevealed);
      if (isRevealed && !wasRevealed) newCard.classList.add('new-reveal');
      card.replaceWith(newCard);
    }
  });
}

function startPolling() {
  setStatus(true);
  pollTimer = setInterval(async () => {
    try {
      const rows = await sbGet(`active_sessions?session_code=eq.${sessionCode}&select=revealed`);
      if (!rows || rows.length === 0) return;
      const revealed = rows[0].revealed || {};
      const str = JSON.stringify(revealed);
      if (str !== lastRevealedStr) {
        renderRevealed(revealed);
        prevRevealed = revealed;
        lastRevealedStr = str;
      }
      setStatus(true);
    } catch { setStatus(false); }
  }, 2000);
}

function setStatus(online) {
  document.getElementById('status-dot').className = online ? 'status-dot' : 'status-dot offline';
  document.getElementById('status-text').textContent = online ? 'Live' : 'Reconnecting\u2026';
}
</script>

<!-- Capture flash overlay -->
<div id="ecgCaptureFlash" style="position:fixed;inset:0;background:white;opacity:0;pointer-events:none;z-index:9999;transition:opacity 0.15s;"></div>

<script>
let _ecgInst       = null;
let _currentRhythm = null;
let _ecgFrozen     = false;
let _ecgSeed       = null;

function ecgFlash() {
  const el = document.getElementById('ecgCaptureFlash');
  el.style.background = 'white';
  el.style.opacity = '0.12';
  setTimeout(() => { el.style.opacity = '0'; }, 200);
}

function initECG(rhythmKey, bpm, bbbMode, showGrid) {
  const container = document.getElementById('ecg-12lead-container');
  container.style.width = '100%';
  if (_ecgInst) _ecgInst.destroy();
  _ecgFrozen = false;
  document.getElementById('snapBtn').textContent = '\u23f8 SNAPSHOT';
  const panel = document.getElementById('ecg-panel');
  const bar = document.querySelector('.ecg-section-bar');
  const barH = bar ? bar.offsetHeight : 32;
  const availH = (panel.clientHeight || panel.offsetHeight) - barH;
  const targetH = availH > 200 ? availH : 0;
  _ecgInst = new ECGEngine(container, {
    mode: '12lead',
    theme: 'monitor',
    height: targetH,
    onCapture: () => {
      ecgFlash();
      _ecgFrozen = true;
      const btn = document.getElementById('snapBtn');
      btn.textContent = '\u25b6 RESUME';
      btn.classList.add('frozen');
      setTimeout(() => _ecgInst && _ecgInst.setTheme('paper'), 150);
    }
  });
  _ecgInst.setRhythm(rhythmKey, bpm, bbbMode);
  if (_ecgSeed) _ecgInst.applySeed(_ecgSeed);
  setGridVisible(showGrid);
  document.getElementById('ecg-section').classList.add('visible');
}

function setGridVisible(visible) {
  if (!_ecgInst) return;
  const container = document.getElementById('ecg-12lead-container');
  const grid = container.querySelector('#_ecg_leadsGrid');
  if (grid) grid.style.display = visible ? 'grid' : 'none';
  document.getElementById('ecg-bar-label').textContent =
    visible ? '12-LEAD ECG' : 'LEAD II \u2014 RHYTHM STRIP';
}

function ecgSnapshot() {
  if (!_ecgInst) return;
  const btn = document.getElementById('snapBtn');
  if (_ecgFrozen) {
    _ecgInst.resume();
    _ecgInst.setTheme('monitor');
    _ecgFrozen = false;
    btn.textContent = '\u23f8 SNAPSHOT';
    btn.classList.remove('frozen');
  } else {
    _ecgInst.capture();
  }
}

const _origRenderRevealed = renderRevealed;
renderRevealed = function(revealed) {
  _origRenderRevealed(revealed);
  if (!scenario) return;
  if (revealed.ecgSeed) _ecgSeed = revealed.ecgSeed;
  const vitals = scenario.vitals || {};
  const rhythmStr = vitals.Rhythm || '';
  const hr = parseInt(vitals.HR) || 72;
  if (!rhythmStr) return;
  const mapped = ECGEngine.mapRhythm(rhythmStr, hr);
  const wantLeadII = !!revealed.LeadII;
  const want12Lead = !!revealed.ECG;
  if (!wantLeadII && !want12Lead) {
    if (_ecgInst) { _ecgInst.destroy(); _ecgInst = null; }
    document.getElementById('ecg-section').classList.remove('visible');
    _currentRhythm = null;
    return;
  }
  if (want12Lead) {
    if (_currentRhythm !== rhythmStr || !_ecgInst) {
      _currentRhythm = rhythmStr;
      initECG(mapped.key, mapped.bpm, mapped.bbbMode, true);
    } else {
      setGridVisible(true);
    }
  } else if (wantLeadII) {
    if (_currentRhythm !== rhythmStr || !_ecgInst) {
      _currentRhythm = rhythmStr;
      initECG(mapped.key, mapped.bpm, mapped.bbbMode, false);
    }
  }
};

let _resizeTimer = null;
window.addEventListener('resize', () => {
  if (!_ecgInst || !_currentRhythm || !scenario) return;
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    const vitals = scenario.vitals || {};
    const rhythmStr = vitals.Rhythm || '';
    const hr = parseInt(vitals.HR) || 72;
    const mapped = ECGEngine.mapRhythm(rhythmStr, hr);
    const showGrid = document.getElementById('ecg-bar-label').textContent.includes('12');
    initECG(mapped.key, mapped.bpm, mapped.bbbMode, showGrid);
  }, 300);
});
</script>

</body>
